<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="900" height="620" fill="#0A0C12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#D4AF37" letter-spacing="2">DungeonMind — Runtime Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#9CA3AF">Google Antigravity Hackathon | All 5 agents run at runtime during active gameplay</text>

  <!-- ═══ FLUTTER APP BOX ═══ -->
  <rect x="20" y="72" width="860" height="90" rx="8" fill="#13161F" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="36" y="92" font-size="11" font-weight="bold" fill="#D4AF37">FLUTTER MOBILE APP (Dart + Flame + Riverpod)</text>

  <rect x="36" y="100" width="130" height="48" rx="6" fill="#1C2030" stroke="#2563EB" stroke-width="1"/>
  <text x="101" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">GameScreen</text>
  <text x="101" y="134" text-anchor="middle" font-size="9" fill="#9CA3AF">Flame Engine</text>
  <text x="101" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">D-Pad + HUD</text>

  <rect x="180" y="100" width="130" height="48" rx="6" fill="#1C2030" stroke="#D4AF37" stroke-width="1"/>
  <text x="245" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">AI Decision Panel</text>
  <text x="245" y="134" text-anchor="middle" font-size="9" fill="#D4AF37">Live agent stream</text>
  <text x="245" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">Draggable overlay</text>

  <rect x="324" y="100" width="130" height="48" rx="6" fill="#1C2030" stroke="#7C3AED" stroke-width="1"/>
  <text x="389" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">Trace Viewer</text>
  <text x="389" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">Judge evaluation</text>
  <text x="389" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">Full decision log</text>

  <rect x="468" y="100" width="130" height="48" rx="6" fill="#1C2030" stroke="#059669" stroke-width="1"/>
  <text x="533" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">PostGame Screen</text>
  <text x="533" y="134" text-anchor="middle" font-size="9" fill="#059669">DM feedback</text>
  <text x="533" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">Score + strategy</text>

  <rect x="612" y="100" width="130" height="48" rx="6" fill="#1C2030" stroke="#4B5563" stroke-width="1"/>
  <text x="677" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">Auth + Menu</text>
  <text x="677" y="134" text-anchor="middle" font-size="9" fill="#9CA3AF">Firebase Auth</text>
  <text x="677" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">Player stats</text>

  <rect x="756" y="100" width="108" height="48" rx="6" fill="#1C2030" stroke="#4B5563" stroke-width="1"/>
  <text x="810" y="120" text-anchor="middle" font-size="10" fill="#E8E3D5">Leaderboard</text>
  <text x="810" y="134" text-anchor="middle" font-size="9" fill="#9CA3AF">Top 20 global</text>
  <text x="810" y="146" text-anchor="middle" font-size="9" fill="#9CA3AF">Personal best</text>

  <!-- Arrow: Flutter → FastAPI -->
  <line x1="450" y1="162" x2="450" y2="192" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,188 450,198 455,188" fill="#4B5563"/>
  <text x="460" y="180" font-size="9" fill="#9CA3AF">HTTP REST (async)</text>
  <text x="460" y="191" font-size="9" fill="#4B5563">timeout + fallback</text>

  <!-- ═══ FASTAPI BACKEND BOX ═══ -->
  <rect x="20" y="200" width="860" height="240" rx="8" fill="#13161F" stroke="#2563EB" stroke-width="1.5"/>
  <text x="36" y="220" font-size="11" font-weight="bold" fill="#2563EB">FASTAPI BACKEND (Python + uvicorn) — Google Antigravity Runtime Orchestrators</text>

  <!-- DungeonMasterAgent -->
  <rect x="36" y="228" width="155" height="100" rx="6" fill="#1C2030" stroke="#D4AF37" stroke-width="2"/>
  <text x="114" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#D4AF37">DungeonMasterAgent</text>
  <text x="114" y="260" text-anchor="middle" font-size="9" fill="#E8E3D5">Reads player history</text>
  <text x="114" y="273" text-anchor="middle" font-size="9" fill="#E8E3D5">Computes loss_rate</text>
  <text x="114" y="286" text-anchor="middle" font-size="9" fill="#E8E3D5">Sets difficulty+theme</text>
  <text x="114" y="299" text-anchor="middle" font-size="9" fill="#9CA3AF">Writes narrative_intro</text>
  <rect x="44" y="308" width="139" height="14" rx="3" fill="#0A0C12"/>
  <text x="114" y="319" text-anchor="middle" font-size="8" fill="#D4AF37">⚡ Called: session start</text>

  <!-- LevelGeneratorAgent -->
  <rect x="204" y="228" width="155" height="100" rx="6" fill="#1C2030" stroke="#059669" stroke-width="2"/>
  <text x="282" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">LevelGeneratorAgent</text>
  <text x="282" y="260" text-anchor="middle" font-size="9" fill="#E8E3D5">Generates dungeon grid</text>
  <text x="282" y="273" text-anchor="middle" font-size="9" fill="#E8E3D5">Places enemies+items</text>
  <text x="282" y="286" text-anchor="middle" font-size="9" fill="#E8E3D5">Validates path (BFS)</text>
  <text x="282" y="299" text-anchor="middle" font-size="9" fill="#9CA3AF">Returns LevelSchema</text>
  <rect x="212" y="308" width="139" height="14" rx="3" fill="#0A0C12"/>
  <text x="282" y="319" text-anchor="middle" font-size="8" fill="#059669">⚡ Called: each floor</text>

  <!-- RivalAgent -->
  <rect x="372" y="228" width="155" height="100" rx="6" fill="#1C2030" stroke="#EF4444" stroke-width="2"/>
  <text x="450" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#EF4444">RivalAgent</text>
  <text x="450" y="260" text-anchor="middle" font-size="9" fill="#E8E3D5">Reads player_tactics</text>
  <text x="450" y="273" text-anchor="middle" font-size="9" fill="#E8E3D5">After 3 turns: adapts</text>
  <text x="450" y="286" text-anchor="middle" font-size="9" fill="#E8E3D5">Overrides base behavior</text>
  <text x="450" y="299" text-anchor="middle" font-size="9" fill="#9CA3AF">Returns EnemyAction</text>
  <rect x="380" y="308" width="139" height="14" rx="3" fill="#0A0C12"/>
  <text x="450" y="319" text-anchor="middle" font-size="8" fill="#EF4444">⚡ Called: every enemy turn</text>

  <!-- NarrativeAgent -->
  <rect x="540" y="228" width="155" height="100" rx="6" fill="#1C2030" stroke="#7C3AED" stroke-width="2"/>
  <text x="618" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C3AED">NarrativeAgent</text>
  <text x="618" y="260" text-anchor="middle" font-size="9" fill="#E8E3D5">Theme-specific text</text>
  <text x="618" y="273" text-anchor="middle" font-size="9" fill="#E8E3D5">Class-aware writing</text>
  <text x="618" y="286" text-anchor="middle" font-size="9" fill="#E8E3D5">Dark fantasy tone</text>
  <text x="618" y="299" text-anchor="middle" font-size="9" fill="#9CA3AF">Returns NarrativeResponse</text>
  <rect x="548" y="308" width="139" height="14" rx="3" fill="#0A0C12"/>
  <text x="618" y="319" text-anchor="middle" font-size="8" fill="#7C3AED">⚡ Called: key events</text>

  <!-- RefereeAgent -->
  <rect x="708" y="228" width="155" height="100" rx="6" fill="#1C2030" stroke="#2563EB" stroke-width="2"/>
  <text x="786" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#2563EB">RefereeAgent</text>
  <text x="786" y="260" text-anchor="middle" font-size="9" fill="#E8E3D5">Validates actions</text>
  <text x="786" y="273" text-anchor="middle" font-size="9" fill="#E8E3D5">Computes damage+XP</text>
  <text x="786" y="286" text-anchor="middle" font-size="9" fill="#E8E3D5">Detects floor clear</text>
  <text x="786" y="299" text-anchor="middle" font-size="9" fill="#9CA3AF">Returns ActionResult</text>
  <rect x="716" y="308" width="139" height="14" rx="3" fill="#0A0C12"/>
  <text x="786" y="319" text-anchor="middle" font-size="8" fill="#2563EB">⚡ Called: every player action</text>

  <!-- BaseAgent label -->
  <rect x="36" y="338" width="827" height="22" rx="4" fill="#0A0C12" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="353" text-anchor="middle" font-size="9" fill="#9CA3AF">BaseAgent: shared tracing (log_trace) · Gemini client (_call_gemini) · JSON validation (_safe_parse_json) · retry logic · fallback_used flag</text>

  <!-- Redis -->
  <rect x="36" y="368" width="260" height="56" rx="6" fill="#1C2030" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="166" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#F59E0B">Redis (Agent Working Memory)</text>
  <text x="166" y="400" text-anchor="middle" font-size="9" fill="#9CA3AF">session:{id}:player_tactics  ·  dm_plan</text>
  <text x="166" y="413" text-anchor="middle" font-size="9" fill="#9CA3AF">level:{hash}  ·  npc:{hash}  ·  ratelimit</text>

  <!-- Gemini -->
  <rect x="320" y="368" width="260" height="56" rx="6" fill="#1C2030" stroke="#4285F4" stroke-width="2"/>
  <text x="450" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#4285F4">Google Gemini 2.5 Flash</text>
  <text x="450" y="400" text-anchor="middle" font-size="9" fill="#9CA3AF">response_mime_type: application/json</text>
  <text x="450" y="413" text-anchor="middle" font-size="9" fill="#9CA3AF">response_schema: Pydantic model  ·  temp 0.1–0.9</text>

  <!-- Firebase -->
  <rect x="604" y="368" width="260" height="56" rx="6" fill="#1C2030" stroke="#F97316" stroke-width="1.5"/>
  <text x="734" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#F97316">Firebase</text>
  <text x="734" y="400" text-anchor="middle" font-size="9" fill="#9CA3AF">Firestore: sessions · traces · leaderboard</text>
  <text x="734" y="413" text-anchor="middle" font-size="9" fill="#9CA3AF">Realtime DB: live AI status → AI panel</text>

  <!-- Arrows: agents → services -->
  <line x1="166" y1="338" x2="166" y2="366" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="162,363 166,370 170,363" fill="#F59E0B"/>

  <line x1="450" y1="338" x2="450" y2="366" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="446,363 450,370 454,363" fill="#4285F4"/>

  <line x1="734" y1="338" x2="734" y2="366" stroke="#F97316" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="730,363 734,370 738,363" fill="#F97316"/>

  <!-- Arrows: services → bottom section -->
  <line x1="166" y1="424" x2="166" y2="450" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="162,447 166,453 170,447" fill="#F59E0B"/>
  <line x1="450" y1="424" x2="450" y2="450" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="446,447 450,453 454,447" fill="#4285F4"/>
  <line x1="734" y1="424" x2="734" y2="450" stroke="#F97316" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="730,447 734,453 738,447" fill="#F97316"/>

  <!-- ═══ BOTTOM ROW ═══ -->
  <!-- Agentic Loop -->
  <rect x="20" y="456" width="410" height="90" rx="8" fill="#13161F" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="225" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#D4AF37">Agentic Gameplay Loop (Runtime)</text>
  <text x="225" y="492" text-anchor="middle" font-size="10" fill="#E8E3D5">OBSERVE → player history, turn-by-turn tactics</text>
  <text x="225" y="508" text-anchor="middle" font-size="10" fill="#E8E3D5">INFER → engagement_category, dominant_direction</text>
  <text x="225" y="524" text-anchor="middle" font-size="10" fill="#E8E3D5">DECIDE → difficulty, theme, enemy behavior override</text>
  <text x="225" y="540" text-anchor="middle" font-size="10" fill="#E8E3D5">EXECUTE → game adapts invisibly to the player</text>

  <!-- Baseline Mode -->
  <rect x="448" y="456" width="432" height="90" rx="8" fill="#13161F" stroke="#4B5563" stroke-width="1.5"/>
  <text x="664" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#9CA3AF">Baseline Mode (BASELINE_MODE=true)</text>
  <text x="664" y="492" text-anchor="middle" font-size="10" fill="#9CA3AF">All Gemini calls disabled. Fallbacks return instantly.</text>
  <text x="664" y="508" text-anchor="middle" font-size="10" fill="#4B5563">Difficulty: never changes  ·  Enemies: base behavior only</text>
  <text x="664" y="524" text-anchor="middle" font-size="10" fill="#4B5563">Levels: pre-built fallback_levels.py  ·  Narrative: hardcoded</text>
  <text x="664" y="540" text-anchor="middle" font-size="10" fill="#EF4444">Game works. Game never adapts. Measurable difference.</text>

  <!-- Footer -->
  <text x="450" y="572" text-anchor="middle" font-size="10" fill="#4B5563">Built with Google Antigravity  ·  Gemini 2.5 Flash  ·  Flutter + Flame  ·  FastAPI  ·  Firebase  ·  Redis</text>
  <text x="450" y="588" text-anchor="middle" font-size="9" fill="#4B5563">DungeonMind — Google Antigravity Hackathon 2026  ·  "Remove the agents and the game stops working."</text>
</svg>
